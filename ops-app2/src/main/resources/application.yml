spring:
  application:
    name: ops-app2
  thymeleaf:
     prefix: classpath:/templates/
     suffix: .html
     mode : HTML
     encoding: UTF-8
     cache: true
     

server:
  port: 8081

app:
  profile: ${PROFILE:default}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      probes:
        enabled: true
